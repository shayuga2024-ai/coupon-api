name: Coupon API - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build-and-deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t coupon-api .
          docker tag coupon-api:latest 535002880759.dkr.ecr.ap-south-1.amazonaws.com/coupon-api:latest
          docker push 535002880759.dkr.ecr.ap-south-1.amazonaws.com/coupon-api:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster coupon-api-cluster \
            --service coupon-api-service \
            --force-new-deployment \
            --region ap-south-1